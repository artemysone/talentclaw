name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.npm-pkg }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            npm-pkg: darwin-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            npm-pkg: darwin-x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: linux-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> target

      - name: Build release binary
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to npm package
        run: |
          mkdir -p cli/npm/${{ matrix.npm-pkg }}/bin
          cp cli/target/${{ matrix.target }}/release/talentclaw cli/npm/${{ matrix.npm-pkg }}/bin/talentclaw
          chmod +x cli/npm/${{ matrix.npm-pkg }}/bin/talentclaw

      - name: Upload platform package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: cli/npm/${{ matrix.npm-pkg }}

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Prepare main package
        run: |
          # Copy Next.js standalone build
          mkdir -p cli/npm/talentclaw/.next
          cp -r .next/standalone cli/npm/talentclaw/.next/standalone
          cp -r .next/static cli/npm/talentclaw/.next/static

          # Copy skills and persona
          cp -r skills cli/npm/talentclaw/skills
          cp -r persona cli/npm/talentclaw/persona

      - name: Restore platform artifacts into npm packages
        run: |
          for pkg in darwin-arm64 darwin-x64 linux-x64; do
            cp -r artifacts/$pkg/* cli/npm/$pkg/
            chmod +x cli/npm/$pkg/bin/talentclaw
          done

      - name: Publish @artemyshq/talentclaw-cli-darwin-arm64
        working-directory: cli/npm/darwin-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @artemyshq/talentclaw-cli-darwin-x64
        working-directory: cli/npm/darwin-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @artemyshq/talentclaw-cli-linux-x64
        working-directory: cli/npm/linux-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish talentclaw
        working-directory: cli/npm/talentclaw
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

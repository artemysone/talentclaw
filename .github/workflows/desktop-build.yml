name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    runs-on: macos-14  # Apple Silicon runner (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Next.js
        run: |
          bun run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          rm -rf .next/standalone/.claude .next/standalone/.gstack .next/standalone/AGENTS.md .next/standalone/CLAUDE.md .next/standalone/DESIGN.md .next/standalone/TODOS.md .next/standalone/plugin .next/standalone/persona .next/standalone/skills

      - name: Compile Electron sources
        run: |
          npx tsdown desktop/main.ts desktop/preload.ts --out-dir dist-electron --format cjs

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — skip if not set)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization (optional — notarize.ts skips if not set)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-builder --mac --config desktop/electron-builder.config.ts --publish ${{ (github.event_name == 'push' || github.event.inputs.publish == 'true') && 'always' || 'never' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talentclaw-mac-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
